# Dscribe – AI Second Brain (Cloudflare Workers + D1)
name = "dscribe"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# デプロイ先URL例: https://dscribe.<あなたのサブドメイン>.workers.dev
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "dscribe-db"
# setup.sh または「Deploy to Cloudflare」ボタンが自動で書き換えます。
# 手動の場合は `npx wrangler d1 create dscribe-db` の出力のIDを貼り付け
database_id = "REPLACE_WITH_DATABASE_ID"

[observability]
enabled = true

# 自動バックアップ(毎週月曜 03:00 UTC = 12:00 JST)。R2未設定でも安全(実行記録のみ残る)
[triggers]
crons = ["0 3 * * 1"]

# 自動バックアップの保存先。有効にするには:
#  1) Cloudflare ダッシュボード → R2 → バケット「dscribe-backup」を作成
#  2) 下2行のコメント(#)を外してコミット → 自動デプロイ
# [[r2_buckets]]
# binding = "BACKUP"
# bucket_name = "dscribe-backup"
